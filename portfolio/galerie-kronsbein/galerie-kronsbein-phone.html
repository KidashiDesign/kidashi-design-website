<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0c0a08;overflow:hidden;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif}
.scene{position:fixed;inset:0;background:radial-gradient(135% 100% at 78% 26%,#2b231d 0%,#171310 58%,#0c0a08 100%);overflow:hidden}
/* floating artwork */
.floats{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.55}
.f1{position:absolute;left:-4%;top:58%;width:52%;filter:blur(1px) drop-shadow(0 20px 40px rgba(0,0,0,.65));animation:bob1 11s ease-in-out infinite}
.f2{position:absolute;right:-3%;top:5%;width:44%;filter:blur(1px) drop-shadow(0 20px 40px rgba(0,0,0,.65));animation:bob2 13s ease-in-out infinite 1.5s}
@keyframes bob1{0%,100%{transform:rotate(-9deg) translateY(0)}50%{transform:rotate(-9deg) translateY(-9px)}}
@keyframes bob2{0%,100%{transform:rotate(7deg) translateY(0)}50%{transform:rotate(7deg) translateY(-7px)}}
/* dot accent */
.dots{position:absolute;right:5%;bottom:-5%;width:180px;height:180px;z-index:2;pointer-events:none;background-image:radial-gradient(circle,#E08537 22%,transparent 26%);background-size:9px 9px;-webkit-mask-image:radial-gradient(ellipse at 50% 50%,#000 6%,transparent 60%);mask-image:radial-gradient(ellipse at 50% 50%,#000 6%,transparent 60%);opacity:.18;mix-blend-mode:screen}
/* gallery page */
.page{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column}
/* nav */
.gnav{display:flex;flex-direction:column;align-items:flex-start;gap:.5rem;padding:.6rem 1.1rem .7rem;background:rgba(20,17,16,.88);backdrop-filter:blur(8px);border-bottom:1px solid rgba(239,231,217,.1);flex-shrink:0}
.gbrand{display:flex;align-items:center;gap:7px}
.glogo{width:24px;height:24px;background:#3a342c;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:6px;letter-spacing:.04em;line-height:1.1;color:#f3eee4}
.gname{font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:#efe7d9;line-height:1}
.gsub{font-size:7px;color:#9b8f79;letter-spacing:.06em;font-style:italic;margin-top:1px}
.glinks{display:flex;gap:.7rem}
.glinks a{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:rgba(239,231,217,.45);text-decoration:none}
.glinks a.on{color:#E08537}
/* transparent mid lets background show */
.gmid{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 1.1rem .8rem;position:relative}
.gexlabel{font-size:7px;letter-spacing:.3em;text-transform:uppercase;color:#E08537;margin-bottom:.35rem;display:flex;align-items:center;gap:5px}
.gblink{width:5px;height:5px;border-radius:50%;background:#E08537;animation:blink 1.6s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.gextitle{font-size:15px;font-weight:300;letter-spacing:.04em;color:#efe7d9;line-height:1.2;margin-bottom:.3rem}
.gexsub{font-size:9px;font-style:italic;color:#9b8f79;letter-spacing:.04em}
/* bottom bar */
.gbar{background:rgba(20,17,16,.9);backdrop-filter:blur(8px);border-top:1px solid rgba(239,231,217,.1);padding:.7rem 1.1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gdate{font-size:7.5px;letter-spacing:.16em;text-transform:uppercase;color:rgba(239,231,217,.5)}
.gcta{font-size:7px;letter-spacing:.22em;text-transform:uppercase;color:#E08537;display:flex;align-items:center;gap:4px}
.gcta::after{content:'→';font-size:9px}
/* page indicator dots */
.gdots{display:flex;gap:4px;position:absolute;left:50%;bottom:-.6rem;transform:translateX(-50%)}
.gdot{width:4px;height:4px;border-radius:50%;background:rgba(239,231,217,.25)}
.gdot.a{background:#E08537;width:12px;border-radius:2px}
</style>
</head>
<body>
<div class="scene">
  <div class="floats">
    <img src="gk-art-1.webp" class="f1" alt="">
    <img src="gk-art-2.webp" class="f2" alt="">
  </div>
  <div class="dots"></div>
  <div class="page">
    <nav class="gnav">
      <div class="glinks">
        <a href="#" class="on">Exhibition</a>
        <a href="#">Artists</a>
        <a href="#">Interior</a>
        <a href="#">Press</a>
      </div>
      <div class="gbrand">
        <div class="glogo"><span>GAL</span><span>KRO</span></div>
        <div><div class="gname">Galerie Kronsbein</div><div class="gsub">by Sarah Kronsbein</div></div>
      </div>
    </nav>
    <div class="gmid">
      <div class="gexlabel"><span class="gblink"></span>Current Exhibition</div>
      <div class="gextitle">Contemporary<br>Perspectives</div>
      <div class="gexsub">Group Exhibition · Gallery I &amp; II</div>
      <div class="gdots" style="position:relative;left:0;transform:none;margin-top:.8rem">
        <div class="gdot a"></div>
        <div class="gdot"></div>
        <div class="gdot"></div>
      </div>
    </div>
    <div class="gbar">
      <div class="gdate">07 Sep — 12 Nov 2023</div>
      <div class="gcta">View Exhibition</div>
    </div>
  </div>
</div>
</body>
</html>
