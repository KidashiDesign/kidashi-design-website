<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Art Gerecht Modular — Animation</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --agm-cream: #f5f0e8;
      --agm-gold:  #c8a96e;
      --agm-dark:  #2a2218;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--agm-cream);
      overflow: hidden;
    }

    /* ── Hero wrapper ── */
    .agm {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--agm-cream);
    }

    /* ── Animated texture background ── */
    .agm__bg {
      position: absolute; inset: -10%;
      width: 120%; height: 120%;
      object-fit: cover;
      animation: agm-bg-pan 28s ease-in-out infinite;
      will-change: transform;
      filter: brightness(1.06) contrast(0.92) saturate(0.7);
    }

    /* ── Radial vignette ── */
    .agm__vignette {
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse 88% 76% at 50% 50%,
        rgba(253,248,240,0.18) 0%, transparent 55%, rgba(210,195,170,0.55) 100%);
    }

    /* ── Logo ── */
    .agm__logo {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: clamp(90px, 22%, 280px);
      opacity: 0;
      will-change: transform, opacity, top;
      z-index: 20;
    }

    /* ── Technical drawing ── */
    .agm__drawing {
      position: absolute; inset: 0;
      z-index: 12;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 8%;
      opacity: 0;
      pointer-events: none;
    }
    .agm__drawing img {
      width: clamp(100px, 34%, 440px);
      height: auto;
      filter: contrast(1.1) opacity(0.85);
    }

    /* ── 3-D scene ── */
    .agm__scene {
      position: absolute; inset: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1600px;
      perspective-origin: 50% 46%;
      opacity: 0;
      pointer-events: none;
    }
    .agm__stage {
      position: relative;
      transform-style: preserve-3d;
      width: clamp(220px, 60%, 820px);
      aspect-ratio: 4 / 3;
    }
    .agm__card {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
      transform: rotateX(7deg) rotateY(0deg);
      will-change: transform;
    }
    .agm__face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      overflow: hidden;
      border-radius: 3px;
    }
    .agm__face--back {
      transform: rotateY(180deg);
    }
    .agm__face img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ── Shadow ── */
    .agm__shadow {
      position: absolute;
      bottom: 18%; left: 50%;
      transform: translateX(-50%);
      z-index: 14;
      width: clamp(80px, 29%, 380px);
      height: 3%;
      background: radial-gradient(ellipse at 50% 50%, rgba(40,30,10,0.22) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(14px);
      opacity: 0;
      pointer-events: none;
    }

    /* ── Keyframes ── */
    @keyframes agm-bg-pan {
      0%   { transform: scale(1.08) translate(0%,0%); }
      50%  { transform: scale(1.12) translate(-3%,-1.5%); }
      100% { transform: scale(1.08) translate(0%,0%); }
    }
    @keyframes agm-logo-reveal {
      0%   { opacity:0; filter:blur(20px); transform:translate(-50%,-50%) perspective(1000px) scale(0.3) rotateY(-55deg); }
      55%  { opacity:1; filter:blur(0); }
      80%  { transform:translate(-50%,-50%) perspective(1000px) scale(1.07) rotateY(5deg); }
      100% { opacity:1; filter:blur(0); transform:translate(-50%,-50%) perspective(1000px) scale(1) rotateY(0deg); }
    }
    @keyframes agm-logo-to-top {
      0%   { top:50%; transform:translate(-50%,-50%) scale(1); opacity:1; }
      20%  { top:54%; transform:translate(-50%,-50%) scale(1.06); opacity:1; }
      100% { top:20%; transform:translate(-50%,-50%) scale(0.55); opacity:1; }
    }
    @keyframes agm-fade-in  { from { opacity:0; } to { opacity:1; } }
    @keyframes agm-fade-out { from { opacity:1; } to { opacity:0; } }
    @keyframes agm-flyer-orbit {
      from { transform: rotateX(7deg) rotateY(0deg); }
      to   { transform: rotateX(7deg) rotateY(360deg); }
    }
    @keyframes agm-shadow-breathe {
      0%,100% { transform:translateX(-50%) scaleX(1); opacity:0.20; }
      50%      { transform:translateX(-50%) scaleX(0.93); opacity:0.12; }
    }

    /* ── Tile mode: skip intro, jump straight to orbit ── */
    body.tile-mode .agm__logo    { display: none; }
    body.tile-mode .agm__drawing { display: none; }
    body.tile-mode .agm__scene  { opacity: 1; }
    body.tile-mode .agm__shadow { opacity: 0.18; animation: agm-shadow-breathe 16s ease-in-out infinite; }
    body.tile-mode .agm__card   { animation: agm-flyer-orbit 14s linear infinite; }

    @media (prefers-reduced-motion: reduce) {
      .agm__bg, .agm__card, .agm__shadow { animation: none !important; }
    }
  </style>
</head>
<body>
<div class="agm" id="agm-root">
  <img class="agm__bg"
    src="../../images/artgerecht/agm-texture.webp"
    alt="" aria-hidden="true" loading="eager"
    decoding="async">

  <div class="agm__vignette"></div>

  <img class="agm__logo" id="agm-logo"
    src="../../images/artgerecht/agm-logo.webp"
    alt="Art Gerecht Modular" loading="eager" fetchpriority="high">

  <div class="agm__drawing" id="agm-drawing">
    <img src="../../images/artgerecht/agm-drawing.webp" alt="" aria-hidden="true" loading="lazy" decoding="async">
  </div>

  <div class="agm__scene" id="agm-scene">
    <div class="agm__stage">
      <div class="agm__card" id="agm-card">
        <div class="agm__face">
          <img src="../../images/artgerecht/agm-flyer-front.webp" alt="" loading="eager" fetchpriority="high" decoding="async">
        </div>
        <div class="agm__face agm__face--back">
          <img src="../../images/artgerecht/agm-flyer-back.webp" alt="" loading="eager" decoding="async">
        </div>
      </div>
    </div>
  </div>

  <div class="agm__shadow" id="agm-shadow"></div>
</div>

<script>
(function () {
  const isTile = location.search.includes('tile');
  if (isTile) {
    document.body.classList.add('tile-mode');
    return; // tile: CSS handles the loop state already
  }

  // Full cinematic sequence
  const logo    = document.getElementById('agm-logo');
  const scene   = document.getElementById('agm-scene');
  const card    = document.getElementById('agm-card');
  const drawing = document.getElementById('agm-drawing');
  const shadow  = document.getElementById('agm-shadow');

  // Phase 1 — Logo reveal
  setTimeout(() => {
    logo.style.animation = 'agm-logo-reveal 2.6s cubic-bezier(0.16,1,0.3,1) forwards';
  }, 380);

  // Phase 2 — Logo moves to top
  setTimeout(() => {
    logo.style.animation = 'agm-logo-to-top 1.9s cubic-bezier(0.4,0,0.2,1) forwards';
  }, 4500);

  // Phase 3 — Logo fades, drawing appears
  setTimeout(() => {
    logo.style.transition = 'opacity 0.9s ease-out';
    logo.style.opacity = '0';
    drawing.style.animation = 'agm-fade-in 1.2s ease-out forwards';
  }, 5500);

  // Phase 4 — Drawing recedes, flyer orbits in
  setTimeout(() => {
    drawing.style.transition = 'opacity 1.2s ease-out';
    drawing.style.opacity = '0.1';
    scene.style.animation  = 'agm-fade-in 1.2s ease-out forwards';
    shadow.style.animation = 'agm-fade-in 1s ease-out 0.5s both';
    setTimeout(() => {
      shadow.style.animation = 'agm-shadow-breathe 16s ease-in-out infinite';
    }, 1800);
    setTimeout(() => {
      card.style.animation = 'agm-flyer-orbit 16s linear infinite';
    }, 1300);
  }, 9500);
})();
</script>
</body>
</html>
