<!DOCTYPE html>

<script>
(function(){
  if(!location.search.includes('tile'))return;
  var css='text,tspan{display:none!important}[class*="text"],[class*="Text"],[class*="title"],[class*="Title"],[class*="label"],[class*="Label"],[class*="caption"],[class*="Caption"],[class*="heading"],[class*="Heading"]{visibility:hidden!important}';
  function inject(){var s=document.createElement('style');s.textContent=css;(document.head||document.documentElement).appendChild(s);}
  inject();document.addEventListener('DOMContentLoaded',inject);setTimeout(inject,500);setTimeout(inject,1500);
})();

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Seestern Britzer Garten — Showreel</title>
<style>
  /* ── Local fonts (only used by the endscreen) — matched to the brand logo ── */
  @font-face { font-family:'Yellowtail'; font-style:normal; font-weight:400; font-display:swap; src:url("fonts/yellowtail.woff2") format('woff2'); }
  @font-face { font-family:'Montserrat'; font-style:normal; font-weight:500; font-display:swap; src:url("fonts/montserrat-500.woff2") format('woff2'); }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0906; }
  body { font-family:Helvetica, Arial, sans-serif; }

  /* ── Stage: fills the iframe at any aspect ratio ── */
  .stage { position:fixed; inset:0; overflow:hidden; background:#0a0906; }

  .slide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden;
    transition:opacity 0.9s ease, visibility 0s linear 0.9s;
    will-change:opacity;
  }
  .slide.is-active { opacity:1; visibility:visible; transition:opacity 0.9s ease; }

  /* ============================================================
     SLIDE 1 — START (cinematic logo reveal)
     ============================================================ */
  .s-start { background:#0a0906; }
  .s-start__frame {
    position:relative; width:100%; height:100%; overflow:hidden;
  }
  @keyframes bgReveal   { 0%{filter:brightness(0.5) blur(9px) saturate(0.92);} 100%{filter:brightness(0.85) blur(3.5px) saturate(1.02);} }
  @keyframes bgDrift    { 0%{transform:scale(1.06) translate(0%,0%);} 100%{transform:scale(1.12) translate(-1.4%,-1%);} }
  @keyframes vignetteIn { 0%{opacity:0.22;} 100%{opacity:0.48;} }
  @keyframes sweepMove  { 0%{transform:translateX(-140%) rotate(8deg); opacity:0;} 8%{opacity:0.75;} 48%{opacity:0.5;} 100%{transform:translateX(140%) rotate(8deg); opacity:0;} }
  @keyframes glowIn     { 0%{opacity:0; transform:translate(-50%,-50%) scale(0.86);} 100%{opacity:0.7; transform:translate(-50%,-50%) scale(1);} }
  @keyframes logoSharpen{ 0%{opacity:0; filter:blur(7px) brightness(0.86); transform:scale(0.965);} 100%{opacity:1; filter:blur(0) brightness(1.03); transform:scale(1);} }

  .s-start__bg {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    transform-origin:center; backface-visibility:hidden;
    animation:bgReveal 3s ease-out forwards, bgDrift 22s ease-in-out infinite alternate;
  }
  .s-start__vignette {
    position:absolute; inset:0; pointer-events:none; opacity:0;
    background:radial-gradient(ellipse at 50% 48%, transparent 42%, rgba(0,0,0,0.55) 100%);
    animation:vignetteIn 3s ease-out forwards;
  }
  .s-start__sweep {
    position:absolute; inset:-20%; pointer-events:none; opacity:0; mix-blend-mode:soft-light;
    background:linear-gradient(115deg, transparent 42%, rgba(255,247,230,0.55) 50%, transparent 58%);
    animation:sweepMove 2.6s cubic-bezier(0.4,0,0.2,1) 0.2s forwards;
  }
  .s-start__glow {
    position:absolute; left:50.5%; top:50%; width:34%; height:46%;
    transform:translate(-50%,-50%); border-radius:50%; pointer-events:none; opacity:0;
    background:radial-gradient(circle, rgba(255,232,196,0.9) 0%, rgba(255,206,140,0.35) 38%, transparent 72%);
    filter:blur(22px); mix-blend-mode:screen;
    animation:glowIn 2.4s ease-out 1.7s forwards;
  }
  .s-start__logo {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover; pointer-events:none; opacity:0;
    -webkit-mask-image:radial-gradient(ellipse 21% 27% at 52% 51%, #000 0%, #000 42%, transparent 80%);
            mask-image:radial-gradient(ellipse 21% 27% at 52% 51%, #000 0%, #000 42%, transparent 80%);
    animation:logoSharpen 2.6s ease-out 1.6s forwards;
  }

  /* ============================================================
     SLIDE 2 — HERO STRIP (5-panel accordion, JS-driven)
     ============================================================ */
  .s-hero { background:#F6F3EC; padding:clamp(18px,4vw,64px) clamp(12px,3vw,44px); }
  .s-hero__row {
    width:100%; max-width:1600px; height:clamp(240px,60vh,620px);
    display:flex; flex-direction:row; align-items:center; gap:clamp(5px,0.9vw,14px);
  }
  .s-hero__panel {
    flex:1 1 0; height:74%; border-radius:clamp(10px,1.3vw,20px);
    padding:clamp(4px,0.7vw,12px); overflow:hidden; will-change:height;
  }
  .s-hero__panel[data-i="0"] { background:#EADECA; box-shadow:0 10px 30px -12px rgba(40,30,20,0.25); }
  .s-hero__panel[data-i="1"] { background:#C2DCD1; box-shadow:0 10px 30px -12px rgba(20,40,35,0.22); }
  .s-hero__panel[data-i="2"] { background:#AAC9C3; box-shadow:0 10px 30px -12px rgba(15,35,32,0.22); }
  .s-hero__panel[data-i="3"] { background:#DE7749; box-shadow:0 10px 30px -12px rgba(60,25,10,0.28); }
  .s-hero__panel[data-i="4"] { background:#F4A34C; box-shadow:0 10px 30px -12px rgba(60,35,10,0.25); }
  .s-hero__clip { width:100%; height:100%; border-radius:clamp(6px,0.9vw,14px); overflow:hidden; }
  .s-hero__img {
    width:100%; height:100%; object-fit:cover; display:block;
    transform:scale(1); transform-origin:center center; will-change:transform; backface-visibility:hidden;
  }

  /* ============================================================
     SLIDE 3 — ROTATING CIRCLE BADGE
     ============================================================ */
  .s-badge { background:#AAC9C3; overflow:hidden; }
  .s-badge__wrap { position:relative; width:min(90vw,1100px); max-height:88vh; aspect-ratio:5464/3072; }
  .s-badge__svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  @keyframes rotateInner { from{transform:rotate(0);} to{transform:rotate(-360deg);} }
  @keyframes rotateOuter { from{transform:rotate(0);} to{transform:rotate(360deg);} }
  .s-badge__inner { transform-origin:2732px 1536px; animation:rotateInner 16s linear infinite; }
  .s-badge__outer { transform-origin:2732px 1536px; animation:rotateOuter 20s linear infinite; }

  /* ============================================================
     SLIDE 4 — ENDSCREEN (SVG SMIL logo lockup)
     ============================================================ */
  .s-end { background:#E8815F; }
  .s-end__host { width:100%; height:100%; }
  .s-end svg { display:block; width:100%; height:100%; }

  /* ── Reduced motion: hold static, gentle fades only ── */
  @media (prefers-reduced-motion: reduce) {
    .s-start__bg { animation:bgReveal 0.6s ease-out forwards; }
    .s-start__vignette, .s-start__sweep, .s-start__glow { animation:none; opacity:0.4; }
    .s-start__logo { animation:none; opacity:1; filter:none; }
    .s-badge__inner, .s-badge__outer { animation:none; }
  }
</style>

<script>
(function () {
  "use strict";
  var REDUCED = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var slides = Array.prototype.slice.call(document.querySelectorAll('.slide'));
  var byScene = {};
  slides.forEach(function (s) { byScene[s.dataset.scene] = s; });
  var badgeRings = Array.prototype.slice.call(document.querySelectorAll('.s-badge__inner, .s-badge__outer'));

  // Scene running-order and on-screen duration (seconds). Fade overlaps the tail.
  var ORDER = [
    { scene: 'start', dur: 6.0 },
    { scene: 'hero',  dur: 13.0 },
    { scene: 'badge', dur: 9.0 },
    { scene: 'end',   dur: 8.0 }
  ];

  /* ── Restart a "one-shot" scene by re-cloning its markup (start + end) ── */
  var endTpl = document.getElementById('endTpl').innerHTML;
  function resetOneShot(slide) {
    var host = slide.querySelector('[data-oneshot]');
    if (!host) return;
    if (slide.dataset.scene === 'end') {
      host.innerHTML = endTpl;            // fresh SVG → SMIL replays from 0
    } else {
      // start: clone-swap to restart CSS keyframe animations
      var fresh = host.cloneNode(true);
      host.parentNode.replaceChild(fresh, host);
    }
  }

  /* ── Hero-strip accordion timeline (faithful port of the GSAP timeline) ── */
  var STEP = 2, EXPAND = 1, HOLD = 1, SHRINK = 1, LOOP = 11; // seconds
  var heroPanels = Array.prototype.slice.call(document.querySelectorAll('#heroRow .s-hero__panel'));
  var heroImgs = heroPanels.map(function (p) { return p.querySelector('.s-hero__img'); });
  var heroStart = 0, heroRunning = false;

  function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2; }   // power2.inOut
  function easeInOutSine(t)  { return -(Math.cos(Math.PI*t) - 1)/2; }                        // sine.inOut
  function clamp01(v) { return v < 0 ? 0 : v > 1 ? 1 : v; }

  function renderHero(now) {
    var local = ((now - heroStart) / 1000) % LOOP;
    for (var i = 0; i < heroPanels.length; i++) {
      var t0 = i * STEP;
      var dt = local - t0;
      var h = 74, sc = 1;
      if (dt >= 0 && dt <= EXPAND + HOLD + SHRINK) {
        if (dt <= EXPAND) {                       // expanding
          h = 74 + 26 * easeInOutCubic(dt / EXPAND);
        } else if (dt <= EXPAND + HOLD) {         // hold open
          h = 100;
        } else {                                  // shrinking
          h = 100 - 26 * easeInOutCubic((dt - EXPAND - HOLD) / SHRINK);
        }
        if (dt <= EXPAND + HOLD) {                // scale grows over expand+hold
          sc = 1 + 0.12 * easeInOutSine(dt / (EXPAND + HOLD));
        } else {                                  // scale shrinks
          sc = 1.12 - 0.12 * easeInOutSine((dt - EXPAND - HOLD) / SHRINK);
        }
      }
      heroPanels[i].style.height = h + '%';
      heroImgs[i].style.transform = 'scale(' + sc.toFixed(4) + ')';
    }
  }

  var rafId = null;
  function heroLoop(now) {
    if (!heroRunning) return;
    renderHero(now);
    rafId = requestAnimationFrame(heroLoop);
  }
  function startHero() {
    if (REDUCED) { heroImgs.forEach(function (im) { im.style.transform = 'scale(1.06)'; }); return; }
    heroStart = performance.now(); heroRunning = true;
    cancelAnimationFrame(rafId); rafId = requestAnimationFrame(heroLoop);
  }
  function stopHero() { heroRunning = false; cancelAnimationFrame(rafId); }

  /* ── Scene sequencer ── */
  var idx = -1, timer = null;
  function show(i) {
    var prev = idx; idx = i;
    var cur = ORDER[i];
    slides.forEach(function (s) { s.classList.remove('is-active'); });

    if (cur.scene === 'start' || cur.scene === 'end') resetOneShot(byScene[cur.scene]);
    byScene[cur.scene].classList.add('is-active');

    if (cur.scene === 'hero') startHero(); else stopHero();

    // Keep the badge's CSS ring rotation running only while visible (perf).
    var badgeState = (cur.scene === 'badge') ? 'running' : 'paused';
    badgeRings.forEach(function (r) { r.style.animationPlayState = badgeState; });

    var wait = cur.dur * 1000;
    clearTimeout(timer);
    timer = setTimeout(function () { show((i + 1) % ORDER.length); }, wait);
  }

  // Kick off once the first background image is ready (avoids a black flash).
  var first = new Image();
  first.onload = first.onerror = function () { show(0); };
  first.src = '../../images/portfolio/seestern/start-bg.webp';

  // Pause the whole reel when the tab/iframe is hidden (saves battery/CPU).
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) { stopHero(); clearTimeout(timer); }
    else if (idx >= 0) { if (ORDER[idx].scene === 'hero') startHero(); show(idx); }
  });
})();
</script>
